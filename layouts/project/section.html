{{ define "main" }}
  <h2 class="text-xl md:text-2xl font-bold font-sans">{{ .Title }}</h2>
  {{ with .Params.description }}
  <p class="text-[#A8A29E]">{{ . }}</p>
  {{ end }}

  <div class="columns-1 md:columns-2 gap-4 mt-4">
    {{ range sort .Pages "Params.date" "desc" }}
      <div class="break-inside-avoid mb-4">
        {{ partial "card/project.html" . }}
      </div>
    {{ end }}
  </div>
{{ end }}
