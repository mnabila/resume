{{ with .Site.GetPage "blog" }}
{{ $pages := sort .Pages "Params.date" "desc" }}
<section id="blog" data-reveal>
  <h2 class="text-xl md:text-2xl font-serif font-bold pb-2">Blog</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    {{ range first 6 $pages }}
      {{ partial "card/blog.html" . }}
    {{ end }}
  </div>
  {{ if gt (len $pages) 6 }}
    <div class="mt-4">
      <a href="{{ .RelPermalink }}" class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200 transition-colors">
        <span>Show More</span>
        <span>&rarr;</span>
      </a>
    </div>
  {{ end }}
</section>
{{ end }}
