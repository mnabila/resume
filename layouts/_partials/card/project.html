<div class="overflow-hidden text-left border border-dashed border-[#57534E] rounded-sm p-3 bg-[#292524]">
  <div class="flex flex-col gap-2">
    <div>
      <a href="{{ .RelPermalink }}">
        <h3 class="md:text-lg font-serif font-bold capitalize pb-2 border-b border-dashed">{{ .Title }}</h3>
      </a>
      <p class="leading-normal py-2 text-sm">{{ .Params.description }}</p>
    </div>
    {{ with .GetTerms "languages" }}
    <div>
      <h4 class="font-semibold capitalize">Language</h4>
      <ul class="flex flex-wrap items-center pt-2 gap-2">
        {{ range . }}
        <li><a href="{{ .RelPermalink }}" class="text-xs px-2 py-1 rounded-sm bg-[#44403C] text-[#D6D3D1] font-mono uppercase hover:bg-[#57534E] transition-colors">{{ .LinkTitle }}</a></li>
        {{ end }}
      </ul>
    </div>
    {{ end }}
    {{ with .GetTerms "tools" }}
    <div>
      <h4 class="font-semibold capitalize">Tools</h4>
      <ul class="flex flex-wrap items-center pt-2 gap-2">
        {{ range . }}
        <li><a href="{{ .RelPermalink }}" class="text-xs px-2 py-1 rounded-sm bg-[#44403C] text-[#D6D3D1] font-mono uppercase hover:bg-[#57534E] transition-colors">{{ .LinkTitle }}</a></li>
        {{ end }}
      </ul>
    </div>
    {{ end }}
  </div>
</div>
