<div class="overflow-hidden text-left border border-dashed border-gray-500 rounded-sm p-3 bg-white">
  <div class="flex flex-col gap-2">
    <div>
      <a href="{{ .RelPermalink }}">
        <h3 class="md:text-lg font-serif font-bold capitalize pb-2 border-b border-dashed">{{ .Title }}</h3>
      </a>
      {{ $dateMachine := .Date | time.Format "2006-01-02T15:04:05-07:00" }}
      {{ $dateHuman := .Date | time.Format ":date_long" }}
      <time datetime="{{ $dateMachine }}" class="text-xs text-gray-500 pt-2 block">{{ $dateHuman }}</time>
      <p class="leading-normal py-2 text-sm">{{ .Params.description }}</p>
    </div>
    {{ with .GetTerms "tags" }}
    <div>
      <ul class="flex flex-wrap items-center gap-2">
        {{ range . }}
        <li><a href="{{ .RelPermalink }}" class="text-xs px-2 py-1 rounded-sm bg-gray-200 font-mono uppercase hover:bg-gray-300 transition-colors">{{ .LinkTitle }}</a></li>
        {{ end }}
      </ul>
    </div>
    {{ end }}
  </div>
</div>
