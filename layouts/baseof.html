<!doctype html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
  <head>
    {{ partial "head.html" . }}
  </head>

  <body class="h-full p-2 md:p-8">
    <a href="#main-content" class="skip-to-content">Skip to content</a>
    <main class="bg-white mx-auto max-w-[1120px] p-4 flex flex-col gap-4 border-gray rounded-lg md:border-2">
      {{ partial "header.html" . }}
      <div id="main-content" class="flex flex-col gap-8">
        {{ block "main" . }}{{ end }}
      </div>
      {{ partial "footer.html" . }}
    </main>
  </body>
</html>
