{{ define "main" }}
  <h2 class="text-xl md:text-2xl font-bold font-sans">{{ .Title }}</h2>
  {{ with .Params.description }}
  <p class="text-gray-600">{{ . }}</p>
  {{ end }}

  {{ $card := "card/blog.html" }}
  {{ if in (slice "language" "tool") .Data.Singular }}
    {{ $card = "card/project.html" }}
  {{ end }}

  {{ partial "pagination.html" (dict "page" . "card" $card) }}
{{ end }}
